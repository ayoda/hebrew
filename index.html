<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Иврит 1010 v54</title>
<style>
body{background:#0f172a;color:#f1f5f9;font-family:sans-serif;display:flex;justify-content:center;margin:0}
#app{width:100%;max-width:400px;padding:20px;text-align:center}
.card{background:#1e293b;padding:30px;border-radius:20px;margin:20px 0;border:1px solid #334155}
.btn{background:#6366f1;color:white;border:none;padding:15px 20px;border-radius:10px;width:100%;margin:5px 0;font-weight:bold;cursor:pointer}
.word{font-size:40px;margin:20px 0}
#stat{font-size:12px;color:#94a3b8;margin-bottom:10px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const GITHUB_USER = "ayoda"; 
const GITHUB_REPO = "hebrew"; 
let DICT = [];
let state = { screen: 'start', words: [], idx: 0, files: [] };

function speak(text) {
    const cleaned = text.replace(/[\u0591-\u05C7]/g, "").trim();
    // Пробуем Google напрямую
    const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleaned)}&tl=iw&client=tw-ob`);
    audio.play().catch(() => {
        // Если Google в бане, пробуем систему
        const utter = new SpeechSynthesisUtterance(cleaned);
        utter.lang = 'he-IL';
        window.speechSynthesis.speak(utter);
    });
}

async function start() {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
    state.files = (await res.json()).filter(f => f.name.endsWith('.txt'));
    render();
}

async function load(url) {
    const res = await fetch(url);
    const text = await res.text();
    DICT = text.split('\n').filter(l => l.includes(';')).map(line => {
        const p = line.split(';');
        return { he: p[1].trim(), tr: p[2].trim(), ru: p[3].trim() };
    });
    state.words = DICT; state.screen = 'play'; render();
}

function render() {
    const app = document.getElementById('app');
    if (state.screen === 'start') {
        app.innerHTML = `<h2>Выбери файл:</h2>` + state.files.map(f => `<button class="btn" onclick="load('${f.download_url}')">${f.name}</button>`).join('');
    } else {
        const w = state.words[state.idx];
        app.innerHTML = `
            <div id="stat">Карточка ${state.idx + 1} из ${state.words.length}</div>
            <div class="card">
                <button class="btn" style="background:#4ade80" onclick="speak('${w.he}')">🔊 СЛУШАТЬ</button>
                <div class="word">${w.he}</div>
                <div style="color:#6366f1">${w.tr}</div>
                <hr style="margin:20px 0; border:0; border-top:1px solid #334155">
                <div class="word" style="color:#4ade80">${w.ru}</div>
            </div>
            <div style="display:flex; gap:10px">
                <button class="btn" onclick="state.idx=Math.max(0,state.idx-1);render()">⬅</button>
                <button class="btn" onclick="state.idx=Math.min(state.words.length-1,state.idx+1);render()">➡</button>
            </div>
            <button class="btn" style="background:transparent; border:1px solid #334155" onclick="state.screen='start';state.idx=0;render()">Назад</button>
        `;
    }
}
start();
</script>
</body>
</html>
