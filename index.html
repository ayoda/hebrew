<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🇮🇱 Иврит 1010 v48 - Engine Check</title>
<style>
:root { --bg-main: #0f172a; --bg-card: #1e293b; --accent: #6366f1; --text-main: #f1f5f9; --radius: 24px; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{height:100%;background:var(--bg-main);color:var(--text-main);font-family:sans-serif;overflow:hidden}
#app{height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.hdr{background:rgba(30,41,59,0.9);padding:15px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05)}
.hdr-title{font-size:20px;font-weight:800;color:var(--accent)}
.scr{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px}
.scroll{flex:1;overflow-y:auto}
.btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; width: 100%; transition: 0.3s; }
.btn-sec { background: transparent; border: 1px solid #334155; color: #94a3b8; padding: 12px; margin-top: 10px; border-radius: 12px; cursor: pointer; width: 100%; }
.dict-item { background: #1e293b; border: 1px solid rgba(99, 102, 241, 0.3); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
.flip-container { perspective: 1000px; width: 100%; height: 380px; margin: 10px 0; }
.flipper { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; cursor: pointer; }
.flipper.flipped { transform: rotateY(180deg); }
.front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-card); border-radius: var(--radius); border: 2px solid rgba(99, 102, 241, 0.3); padding: 20px; }
.back { transform: rotateY(180deg); border-color: #4ade80; }
.word-main { font-size: 38px; font-weight: 800; text-align: center; }
.btn-voice { background: rgba(99, 102, 241, 0.2); border: 2px solid var(--accent); color: white; padding: 15px 30px; border-radius: 50px; margin-bottom: 20px; cursor: pointer; font-weight: bold; }
#debug-log { font-size: 10px; color: #ef4444; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const GITHUB_USER = "ayoda"; 
const GITHUB_REPO = "hebrew"; 
let DICT = [];
let state = { screen: 'start', currentCat: null, words: [], idx: 0, isFlipped: false, mode: 'he', q: '', availableFiles: [] };

function log(msg) {
    const el = document.getElementById('debug-log');
    if(el) el.innerText = "Статус: " + msg;
}

function speak(text) {
    if (!window.speechSynthesis) {
        log("Браузер не поддерживает голос");
        return;
    }
    window.speechSynthesis.cancel();
    
    const cleaned = text.replace(/[\u0591-\u05C7]/g, "").trim();
    const utter = new SpeechSynthesisUtterance(cleaned);
    
    // Пытаемся принудительно найти иврит
    const voices = window.speechSynthesis.getVoices();
    const heVoice = voices.find(v => v.lang.includes('he') || v.lang.includes('iw'));
    
    if (heVoice) {
        utter.voice = heVoice;
        log("Использую голос: " + heVoice.name);
    } else {
        log("Голос иврита не найден в системе! Доступно голосов: " + voices.length);
    }

    utter.onstart = () => log("Воспроизведение...");
    utter.onerror = (e) => log("Ошибка синтеза: " + e.error);
    
    window.speechSynthesis.speak(utter);
}

// Прогрев голосов
window.speechSynthesis.onvoiceschanged = () => {
    const v = window.speechSynthesis.getVoices();
    console.log("Голоса загружены:", v.length);
};

async function fetchFileList() {
    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
        const files = await response.json();
        state.availableFiles = files.filter(f => f.name.endsWith('.txt'));
        render();
    } catch (err) { alert("GitHub Error"); }
}

async function loadFile(url) {
    try {
        const response = await fetch(url);
        const text = await response.text();
        parseData(text);
        state.screen = 'cats';
        render();
    } catch (err) { alert("Load Error"); }
}

function parseData(content) {
    const icons = { "Глаголы": "⚡", "Семья": "👪", "Дом": "🏠", "Еда": "🍎", "Тело": "💪", "Время": "📅", "Числа": "🔢", "Цвета": "🎨", "Поездки": "✈️", "Профессии": "👨‍🏫" };
    DICT = content.split('\n').filter(l => l.includes(';')).map(line => {
        const p = line.split(';');
        const cat = p[0].trim();
        return { cat, he: p[1].trim(), tr: p[2].trim(), ru: p[3].trim(), icon: icons[cat] || "📖" };
    });
}

function render() {
    const app = document.getElementById('app');
    if (state.screen === 'start') {
        app.innerHTML = `<header class="hdr"><div class="hdr-title">ИВРИТ 1010</div></header>
            <div class="scr">
                <button class="btn" onclick="fetchFileList()">🔄 ЗАГРУЗИТЬ СПИСОК</button>
                <div class="scroll">
                    ${state.availableFiles.map(f => `<div class="dict-item" onclick="loadFile('${f.download_url}')">📄 ${f.name}</div>`).join('')}
                </div>
            </div>`;
    } else if (state.screen === 'cats') {
        const cats = [...new Set(DICT.map(w => w.cat))];
        app.innerHTML = `<header class="hdr"><div class="hdr-title">ТЕМЫ</div></header>
            <div class="scr scroll">
                ${cats.map(c => `<div class="dict-item" onclick="state.currentCat='${c}';state.screen='setup';render()">📚 ${c}</div>`).join('')}
                <button class="btn-sec" onclick="state.screen='start';render()">⬅ Назад</button>
            </div>`;
    } else if (state.screen === 'setup') {
        app.innerHTML = `<header class="hdr"><div class="hdr-title">${state.currentCat}</div></header>
            <div class="scr" style="justify-content:center">
                <button class="btn" onclick="state.words=DICT.filter(w=>w.cat===state.currentCat).sort(()=>Math.random()-0.5); state.idx=0; state.screen='flash'; render()">ПОГНАЛИ</button>
                <button class="btn-sec" onclick="state.screen='cats';render()">Назад</button>
            </div>`;
    } else if (state.screen === 'flash') {
        const w = state.words[state.idx];
        app.innerHTML = `<header class="hdr"><div class="hdr-title">${state.currentCat}</div></header>
            <div class="scr">
                <div class="flip-container" onclick="this.querySelector('.flipper').classList.toggle('flipped')">
                    <div class="flipper">
                        <div class="front">
                            <button class="btn-voice" onclick="event.stopPropagation(); speak('${w.he}')">🔊 СЛУШАТЬ</button>
                            <div class="word-main">${w.he}</div>
                            <div style="color:var(--accent);margin-top:10px">[${w.tr}]</div>
                        </div>
                        <div class="back"><div class="word-main" style="color:#4ade80">${w.ru}</div></div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:auto">
                    <button class="btn" style="background:#334155" onclick="state.idx=Math.max(0,state.idx-1);render()">⬅</button>
                    <button class="btn" onclick="state.idx=Math.min(state.words.length-1,state.idx+1);render()">➡</button>
                </div>
                <div id="debug-log"></div>
                <button class="btn-sec" onclick="state.screen='cats';render()">Назад</button>
            </div>`;
    }
}
render();
</script>
</body>
</html>
