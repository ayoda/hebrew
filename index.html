<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🇮🇱 Иврит 1010 v63 - Classic Stable</title>
<style>
:root { --bg-main: #0f172a; --bg-card: #1e293b; --accent: #6366f1; --yellow: #facc15; --text-main: #f1f5f9; --radius: 24px; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{height:100%;background:var(--bg-main);color:var(--text-main);font-family:sans-serif;overflow:hidden}
#app{height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.hdr{background:rgba(30,41,59,0.9);padding:10px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0}
.hdr-title{font-size:18px;font-weight:800;color:var(--accent)}
.scr{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px;position:relative}
.scroll{flex:1;overflow-y:auto}

/* ВОТ ОНИ - НЕЖНО ГОЛУБЫЕ КНОПКИ С БЕЛОЙ РАМКОЙ */
.file-item { 
    background: #add8e6 !important; /* Нежно-голубой */
    border: 3px solid #ffffff !important; /* Белая линия */
    padding: 16px; 
    border-radius: 15px; 
    margin-bottom: 12px; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    gap: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.file-name { color: #000000 !important; font-weight: 900; font-size: 18px; }

.search-wrapper { width: 100%; display: flex !important; align-items: stretch; margin-bottom: 12px; flex-shrink: 0; }
.inner-search { flex: 1; min-width: 50px; padding: 10px; border-radius: 12px 0 0 12px; border: 2px solid var(--accent); background: #0f172a; color: white; font-size: 15px; outline: none; }
.search-btn { width: 85px !important; flex-shrink: 0 !important; background: var(--yellow); color: #000; border: 2px solid var(--accent); border-left: none; border-radius: 0 12px 12px 0; font-weight: 900; font-size: 13px; cursor: pointer; }

.flash-top { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 8px; flex-shrink:0; }
.btn-yellow-up { background: var(--yellow); color: #000; border: none; width: 42px; height: 42px; border-radius: 10px; font-size: 18px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.flash-wrap { position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.flip-container { perspective: 1000px; width: 100%; height: 85%; max-height: 380px; }
.flipper { position: relative; width: 100%; height: 100%; transition: 0.6s; transform-style: preserve-3d; cursor: pointer; }
.flipper.flipped { transform: rotateY(180deg); }
.front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-card); border-radius: var(--radius); border: 2px solid rgba(99, 102, 241, 0.4); padding: 15px; }
.back { transform: rotateY(180deg); border-color: #4ade80; }

.side-nav { position: absolute; top: 55%; transform: translateY(-50%); background: rgba(99, 102, 241, 0.25); border: 1px solid var(--accent); color: white; width: 40px; height: 70px; border-radius: 8px; font-size: 22px; z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.side-prev { left: -5px; }
.side-next { right: -5px; }

.emoji-box { font-size: 45px; margin-bottom: 5px; }
.word-main { font-size: 32px; font-weight: 800; text-align: center; line-height: 1.1; }
.word-sub { font-size: 16px; color: var(--accent); margin-top: 10px; text-align: center; }
.btn-voice { background: rgba(99, 102, 241, 0.15); border: 1px solid var(--accent); color: var(--accent); padding: 8px 18px; border-radius: 50px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }

.btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; width: 100%; }
.cat-card, .search-res-card { background: var(--bg-card); border-radius: 16px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.05); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const GITHUB_USER = "ayoda"; 
const GITHUB_REPO = "hebrew"; 
let DICT = [];
let state = { screen: 'start', currentCat: null, words: [], idx: 0, isFlipped: false, mode: 'he', q: '', availableFiles: [] };

function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'he-IL';
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

async function fetchFileList() {
    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
        const files = await response.json();
        state.availableFiles = files.filter(f => f.name.endsWith('.txt'));
        render();
    } catch (err) { alert("GitHub Error"); }
}

async function loadFile(url) {
    try {
        const response = await fetch(url);
        const text = await response.text();
        parseData(text);
        state.screen = 'cats';
        render();
    } catch (err) { alert("Load Error"); }
}

function parseData(content) {
    DICT = content.split('\n').filter(l => l.includes(';')).map(line => {
        const p = line.split(';');
        return { cat: p[0].trim(), he: p[1].trim(), tr: p[2].trim(), ru: p[3].trim(), icon: (p[4] || "📖").trim() };
    });
}

function runSearch(id) {
    const el = document.getElementById(id);
    if(!el || !el.value) return;
    state.q = el.value.toLowerCase();
    state.screen = 'cats';
    render();
}

function render() {
    const app = document.getElementById('app');
    if (state.screen === 'start') {
        app.innerHTML = `<header class="hdr"><div class="hdr-title">ИВРИТ 1010</div></header>
            <div class="scr scroll">
                <h2 style="text-align:center; margin-bottom:20px">Привет, Михалыч!</h2>
                <div id="file-list">
                    ${state.availableFiles.length === 0 
                        ? '<button class="btn" onclick="fetchFileList()">🔄 ЗАГРУЗИТЬ СПИСОК</button>' 
                        : state.availableFiles.map(f => `<div class="file-item" onclick="loadFile('${f.download_url}')"><span style="font-size:20px">📄</span> <span class="file-name">${f.name}</span></div>`).join('')}
                </div>
            </div>`;
    } else if (state.screen === 'cats') {
        const cats = [...new Set(DICT.map(w => w.cat))];
        app.innerHTML = `<header class="hdr"><div class="hdr-title">ТЕМЫ</div></header>
            <div class="scr">
                <div class="search-wrapper">
                    <button class="btn-yellow-up" style="margin-right:8px" onclick="state.screen='start';render()">▲</button>
                    <input type="text" id="catSearch" class="inner-search" placeholder="🔍 Поиск..." value="${state.q}">
                    <button class="search-btn" onclick="runSearch('catSearch')">Искать</button>
                </div>
                <div id="list-area" class="scroll">${state.q ? "" : renderCatsHtml(cats)}</div>
            </div>`;
        if (state.q) renderSearch();
    } else if (state.screen === 'setup') {
        app.innerHTML = `<header class="hdr"><div class="hdr-title">${state.currentCat}</div></header>
            <div class="scr"><div style="background:var(--bg-card); padding:20px; border-radius:20px; text-align:center">
            <button class="btn ${state.mode === 'he' ? '' : 'btn-sec'}" onclick="state.mode='he';render()">Иврит → Перевод</button>
            <button class="btn ${state.mode === 'tr' ? '' : 'btn-sec'}" onclick="state.mode='tr';render()">Транскрипция → Перевод</button>
            <button class="btn" style="margin-top:20px" onclick="startFlash()">ПОГНАЛИ</button>
            <button onclick="state.screen='cats';render()" style="background:transparent; border: 1px solid #334155; color: #94a3b8; padding: 12px; margin-top: 10px; border-radius: 12px; cursor: pointer; width: 100%;">Назад</button></div></div>`;
    } else if (state.screen === 'flash') {
        const w = state.words[state.idx];
        const searchUI = (side) => `
            <div class="search-wrapper" onclick="event.stopPropagation()">
                <input type="text" id="inp_${side}" class="inner-search" placeholder="🔍 Найти...">
                <button class="search-btn" onclick="runSearch('inp_${side}')">Искать</button>
            </div>`;

        app.innerHTML = `<header class="hdr"><div class="hdr-title">${state.currentCat}</div></header>
            <div class="scr">
                <div class="flash-top">
                    <button class="btn-yellow-up" onclick="state.screen='cats';render()">▲</button>
                    <div style="font-size:18px; font-weight:bold; color:#94a3b8">${state.idx + 1} / ${state.words.length}</div>
                </div>
                <div class="flash-wrap">
                    <button class="side-nav side-prev" onclick="changeIdx(-1)">❮</button>
                    <div class="flip-container">
                        <div class="flipper ${state.isFlipped ? 'flipped' : ''}" onclick="state.isFlipped = !state.isFlipped; render()">
                            <div class="front">
                                ${searchUI('f')}
                                <div class="emoji-box">${w.icon}</div>
                                <button class="btn-voice" onclick="event.stopPropagation(); speak('${w.he}')">🔊</button>
                                <div class="word-main">${state.mode === 'he' ? w.he : w.tr}</div>
                                <div class="word-sub">[${w.tr}]</div>
                            </div>
                            <div class="back">
                                ${searchUI('b')}
                                <div class="emoji-box">${w.icon}</div>
                                <div class="word-main" style="color:#4ade80">${w.ru}</div>
                            </div>
                        </div>
                    </div>
                    <button class="side-nav side-next" onclick="changeIdx(1)">❯</button>
                </div>
            </div>`;
    }
}
function renderSearch() {
    const q = state.q.trim();
    const listArea = document.getElementById('list-area');
    if (!listArea) return;
    const filtered = DICT.filter(w => w.he.toLowerCase().indexOf(q) !== -1 || w.ru.toLowerCase().indexOf(q) !== -1 || w.tr.toLowerCase().indexOf(q) !== -1);
    listArea.innerHTML = filtered.map(w => `<div class="cat-card" onclick="jumpToWord('${w.he}')">
        <div style="font-size:18px; margin-right:12px">${w.icon}</div>
        <div class="res-info"><b>${w.he}</b> [${w.tr}]<br><small>${w.ru}</small></div></div>`).join('');
}
function renderCatsHtml(cats) {
    return cats.map(c => `<div class="cat-card" onclick="openSetup('${c}')"><div style="font-size:18px; margin-right:12px">${DICT.find(w => w.cat === c).icon || '📚'}</div><div>${c}</div></div>`).join('');
}
function jumpToWord(he) {
    const w = DICT.find(x => x.he === he);
    state.currentCat = w.cat; state.words = DICT.filter(x => x.cat === w.cat);
    state.idx = state.words.findIndex(x => x.he === he);
    state.isFlipped = false; state.screen = 'flash'; render();
}
function openSetup(c) { state.currentCat = c; state.screen = 'setup'; render(); }
function startFlash() {
    state.words = DICT.filter(w => w.cat === state.currentCat).sort(() => Math.random() - 0.5);
    state.idx = 0; state.isFlipped = false; state.screen = 'flash'; render();
}
function changeIdx(delta) {
    let n = state.idx + delta;
    if (n >= 0 && n < state.words.length) { state.idx = n; state.isFlipped = false; render(); }
}
render();
</script>
</body>
</html>
