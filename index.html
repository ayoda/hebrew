<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🇮🇱 Иврит 1010 v28 - Universal Loader</title>
<style>
:root {
  --bg-main: #0f172a;
  --bg-card: #1e293b;
  --accent: #6366f1;
  --text-main: #f1f5f9;
  --text-muted: #94a3b8;
  --radius: 24px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg-main);color:var(--text-main);font-family:sans-serif;overflow:hidden}
#app{height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.hdr{background:rgba(30,41,59,0.9);padding:15px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05)}
.hdr-title{font-size:20px;font-weight:800;color:var(--accent)}
.scr{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px}
.scroll{flex:1;overflow-y:auto}

.search-container { margin-bottom: 20px; }
.search-input { 
    width: 100%; padding: 16px 20px; border-radius: 15px; border: 2px solid var(--accent); 
    background: #1e293b; color: white; font-size: 18px; outline: none;
}

.welcome-box{text-align:center;margin-top:50px}
.file-label { display: inline-block; background: var(--accent); color: white; padding: 20px 30px; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 20px; }
#fileInput { display: none; }

.cat-card, .search-res-card { background: var(--bg-card); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.05); }
.cat-icon { font-size: 24px; margin-right: 15px; background: rgba(99, 102, 241, 0.1); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
.res-info { display: flex; flex-direction: column; }
.res-he { font-weight: 800; font-size: 18px; color: #fff; }
.res-ru { color: var(--accent); font-size: 14px; }

.mode-btn{background:#334155;color:white;border:none;padding:15px;border-radius:12px;width:100%;margin-bottom:10px;font-weight:600;cursor:pointer}
.mode-btn.active{background:var(--accent)}

.flip-container { perspective: 1000px; width: 100%; height: 380px; margin: 10px 0; }
.flipper { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
.flipper.flipped { transform: rotateY(180deg); }
.front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-card); border-radius: var(--radius); border: 2px solid rgba(99, 102, 241, 0.3); padding: 20px; }
.back { transform: rotateY(180deg); border-color: #4ade80; }

.emoji-box { font-size: 60px; margin-bottom: 10px; }
.word-main { font-size: 40px; font-weight: 800; text-align: center; line-height: 1.1; }
.word-sub { font-size: 18px; color: var(--accent); margin-top: 15px; text-align: center; }
.btn-voice { background: rgba(99, 102, 241, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 50px; margin-bottom: 20px; cursor: pointer; }
.nav-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: auto; }
.btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; }
.btn-sec { background: transparent; border: 1px solid #334155; color: var(--text-muted); padding: 12px; margin-top: 10px; border-radius: 12px; cursor: pointer; }
</style>
</head>
<body>
<div id="app"></div>

<script>
let DICT = [];
let state = {
  screen: 'start',
  currentCat: null,
  words: [],
  idx: 0,
  isFlipped: false,
  mode: 'he',
  q: ''
};

function speak(text) {
    if (!text) return;
    let t = text.trim();
    if (t === 'אתן') t = 'אַתֶן';
    if (t === 'את') t = 'אַת';
    const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(t)}&tl=iw&client=tw-ob`);
    audio.play();
}

function render() {
    const app = document.getElementById('app');
    if (state.screen === 'start') {
        app.innerHTML = `<header class="hdr"><div class="hdr-title">ИВРИТ 1010</div></header>
            <div class="scr scroll"><div class="welcome-box"><h2>Привет, Михалыч!</h2>
            <label for="fileInput" class="file-label">📂 ОТКРЫТЬ СЛОВАРЬ</label>
            <input type="file" id="fileInput" accept=".txt" onchange="loadDictionary(event)"></div></div>`;
        return;
    }
    if (state.screen === 'cats') {
        const cats = [...new Set(DICT.map(w => w.cat))];
        app.innerHTML = `<header class="hdr"><div class="hdr-title">ТЕМЫ</div></header>
            <div class="scr"><div class="search-container">
            <input type="text" class="search-input" placeholder="🔍 Поиск..." oninput="state.q = this.value.toLowerCase(); renderSearch()" value="${state.q}">
            </div><div id="list-area" class="scroll">${state.q ? "" : renderCatsHtml(cats)}</div>
            <button class="btn-sec" style="width:100%" onclick="state.screen='start';render()">⬅ Назад</button></div>`;
        if (state.q) renderSearch();
    }
    if (state.screen === 'setup') {
        app.innerHTML = `<header class="hdr"><div class="hdr-title">${state.currentCat}</div></header>
            <div class="scr"><div style="background:var(--bg-card); padding:20px; border-radius:20px; text-align:center">
            <h3 style="margin-bottom:20px">Режим:</h3>
            <button class="mode-btn ${state.mode === 'he' ? 'active' : ''}" onclick="state.mode='he';render()">Иврит → Перевод</button>
            <button class="mode-btn ${state.mode === 'tr' ? 'active' : ''}" onclick="state.mode='tr';render()">Транскрипция → Перевод</button>
            <button class="btn" style="width:100%; margin-top:20px" onclick="startFlash()">ПОЕХАЛИ</button>
            <button class="btn-sec" style="width:100%" onclick="state.screen='cats';render()">Назад</button></div></div>`;
    }
    if (state.screen === 'flash') {
        const w = state.words[state.idx];
        app.innerHTML = `<header class="hdr"><div class="hdr-title">${state.currentCat}</div></header>
            <div class="scr"><div style="text-align:center; color:var(--text-muted); mb:5px">${state.idx + 1} / ${state.words.length}</div>
            <div class="flip-container"><div class="flipper ${state.isFlipped ? 'flipped' : ''}" onclick="state.isFlipped = !state.isFlipped; render()">
            <div class="front"><div class="emoji-box">${w.icon}</div>
            <button class="btn-voice" onclick="event.stopPropagation(); speak('${w.he}')">🔊 СЛУШАТЬ</button>
            <div class="word-main">${state.mode === 'he' ? w.he : w.tr}</div>
            <div class="word-sub">${state.mode === 'he' ? '['+w.tr+']' : w.he}</div></div>
            <div class="back"><div class="emoji-box">${w.icon}</div>
            <div class="word-main" style="color:#4ade80; font-size:28px">${w.ru}</div></div></div></div>
            <div class="nav-btns"><button class="btn" style="background:#334155" onclick="changeIdx(-1)">⬅</button>
            <button class="btn" onclick="changeIdx(1)">➡</button></div>
            <button class="btn-sec" onclick="state.screen='cats';render()">Назад</button></div>`;
    }
}

function renderSearch() {
    const q = state.q.trim();
    const listArea = document.getElementById('list-area');
    if (!listArea) return;
    const filtered = DICT.filter(w => w.he.toLowerCase().includes(q) || w.ru.toLowerCase().includes(q) || w.tr.toLowerCase().includes(q));
    listArea.innerHTML = filtered.map(w => `<div class="search-res-card" onclick="jumpToWord('${w.he}')">
        <div class="cat-icon" style="font-size:20px">${w.icon}</div>
        <div class="res-info"><div class="res-he">${w.he} [${w.tr}]</div><div class="res-ru">${w.ru} (${w.cat})</div></div></div>`).join('') || '<div style="text-align:center; padding:20px;">Ничего не нашли</div>';
}

function renderCatsHtml(cats) {
    return cats.map(c => `<div class="cat-card" onclick="openSetup('${c}')">
        <div class="cat-icon">${DICT.find(w => w.cat === c).icon || '📚'}</div>
        <div class="cat-name">${c} (${DICT.filter(w => w.cat === c).length})</div></div>`).join('');
}

function loadDictionary(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const autoIcons = { "Глаголы": "⚡", "Поездки": "✈️", "Предметы": "📦", "Семья": "👪", "Дом": "🏠" };
        DICT = e.target.result.split('\n').filter(l => l.includes(';')).map(line => {
            const p = line.split(';');
            const cat = p[0].trim();
            let icon = p[4] ? p[4].trim() : (autoIcons[cat] || "📖");
            return { cat, he: p[1].trim(), tr: p[2].trim(), ru: p[3].trim(), icon };
        });
        state.screen = 'cats'; render();
    };
    reader.readAsText(file);
}

function jumpToWord(he) {
    const w = DICT.find(x => x.he === he);
    state.currentCat = w.cat;
    state.words = DICT.filter(x => x.cat === w.cat);
    state.idx = state.words.findIndex(x => x.he === he);
    state.isFlipped = false; state.screen = 'flash'; render();
}

function openSetup(c) { state.currentCat = c; state.screen = 'setup'; render(); }
function startFlash() {
    state.words = DICT.filter(w => w.cat === state.currentCat).sort(() => Math.random() - 0.5);
    state.idx = 0; state.isFlipped = false; state.screen = 'flash'; render();
}
function changeIdx(delta) {
    let n = state.idx + delta;
    if (n >= 0 && n < state.words.length) { state.idx = n; state.isFlipped = false; render(); }
}
render();
</script>
</body>
</html>
