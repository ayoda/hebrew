<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🇮🇱 Иврит 1010 v60 - Final Fix</title>
<style>
:root { --bg-main: #0f172a; --bg-card: #1e293b; --accent: #6366f1; --yellow: #facc15; --text-main: #f1f5f9; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{height:100%;background-color:#0f172a;color:#f1f5f9;font-family:sans-serif;overflow:hidden}
#app{height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.hdr{background-color:#1e293b;padding:12px;text-align:center;border-bottom:1px solid #334155;flex-shrink:0}
.hdr-title{font-size:18px;font-weight:800;color:#6366f1}
.scr{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px;position:relative}
.scroll{flex:1;overflow-y:auto}

/* ВЫБОР ФАЙЛА - ТОЧНО С БЕЛОЙ РАМКОЙ */
.file-item { 
    background-color: #1e293b !important; 
    border: 2px solid #ffffff !important; /* Чисто белый цвет */
    border-radius: 15px !important; 
    padding: 18px !important; 
    margin-bottom: 15px !important; 
    display: block !important; /* Чтобы занимала всю ширину */
    cursor: pointer;
    text-decoration: none;
}
.file-name { font-size: 18px; font-weight: bold; color: #ffffff; display: flex; align-items: center; gap: 10px; }

/* ПОИСК - ФИКС ДЛЯ МОБИЛОК */
.search-wrapper { width: 100%; display: flex !important; margin-bottom: 12px; flex-shrink: 0; }
.inner-search { 
    flex: 1; padding: 12px; border-radius: 12px 0 0 12px; 
    border: 2px solid #6366f1; background-color: #0f172a; color: white; 
    font-size: 16px; outline: none; min-width: 50px;
}
.search-btn { 
    width: 90px !important; background-color: #facc15; color: #000; 
    border: 2px solid #6366f1; border-left: none; 
    border-radius: 0 12px 12px 0; font-weight: 900; font-size: 14px; 
    cursor: pointer; flex-shrink: 0 !important;
}

/* ФЛЭШ-КАРТА */
.flash-top { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 8px; flex-shrink:0; }
.btn-yellow-up { background-color: #facc15; color: #000; border: none; width: 45px; height: 45px; border-radius: 10px; font-size: 20px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.flash-wrap { position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.flip-container { perspective: 1000px; width: 100%; height: 380px; }
.flipper { position: relative; width: 100%; height: 100%; transition: 0.6s; transform-style: preserve-3d; cursor: pointer; }
.flipper.flipped { transform: rotateY(180deg); }

.front, .back { 
    position: absolute; width: 100%; height: 100%; 
    backface-visibility: hidden; 
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    background-color: #1e293b; border-radius: 24px; 
    border: 2px solid #6366f1; padding: 15px; 
}
.back { transform: rotateY(180deg); border-color: #4ade80; }

.side-nav { position: absolute; top: 50%; transform: translateY(-50%); background-color: rgba(99, 102, 241, 0.4); border: 1px solid #6366f1; color: white; width: 42px; height: 75px; border-radius: 8px; font-size: 24px; z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.side-prev { left: -5px; }
.side-next { right: -5px; }

.emoji-box { font-size: 50px; margin-bottom: 5px; }
.word-main { font-size: 36px; font-weight: 800; text-align: center; line-height: 1.1; }
.word-sub { font-size: 18px; color: #6366f1; margin-top: 10px; text-align: center; }
.btn-voice { background-color: #1e293b; border: 1px solid #6366f1; color: #6366f1; padding: 10px 20px; border-radius: 50px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }

.btn { background-color: #6366f1; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; width: 100%; }
.cat-card { background-color: #1e293b; border-radius: 16px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; cursor: pointer; border: 1px solid #334155; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const GITHUB_USER = "ayoda"; 
const GITHUB_REPO = "hebrew"; 
let DICT = [];
let state = { screen: 'start', currentCat: null, words: [], idx: 0, isFlipped: false, mode: 'he', q: '', availableFiles: [] };

function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'he-IL';
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

async function fetchFileList() {
    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
        const files = await response.json();
        state.availableFiles = files.filter(f => f.name.indexOf('.txt') !== -1);
        render();
    } catch (err) { alert("GitHub Error"); }
}

async function loadFile(url) {
    try {
        const response = await fetch(url);
        const text = await response.text();
        parseData(text);
        state.screen = 'cats';
        render();
    } catch (err) { alert("Load Error"); }
}

function parseData(content) {
    DICT = content.split('\n').filter(l => l.indexOf(';') !== -1).map(line => {
        const p = line.split(';');
        return { cat: p[0].trim(), he: p[1].trim(), tr: p[2].trim(), ru: p[3].trim(), icon: (p[4] || "📖").trim() };
    });
}

function runSearch(id) {
    const el = document.getElementById(id);
    if(!el || !el.value) return;
    state.q = el.value.toLowerCase();
    state.screen = 'cats';
    render();
}

function render() {
    const app = document.getElementById('app');
    if (state.screen === 'start') {
        app.innerHTML = `<header class="hdr"><div class="hdr-title">ИВРИТ 1010</div></header>
            <div class="scr scroll">
                <h2 style="text-align:center; margin-bottom:25px">Привет, Михалыч!</h2>
                ${state.availableFiles.length === 0 
                    ? '<button class="btn" onclick="fetchFileList()">🔄 ЗАГРУЗИТЬ СПИСОК</button>' 
                    : state.availableFiles.map(f => `
                        <div class="file-item" onclick="loadFile('${f.download_url}')">
                            <div class="file-name">📄 ${f.name}</div>
                        </div>`).join('')}
            </div>`;
    } else if (state.screen === 'cats') {
        const cats = [...new Set(DICT.map(w => w.cat))];
        app.innerHTML = `<header class="hdr"><div class="hdr-title">ТЕМЫ</div></header>
            <div class="scr">
                <div class="search-wrapper">
                    <button class="btn-yellow-up" style="margin-right:8px" onclick="state.screen='start';render()">▲</button>
                    <input type="text" id="catSearch" class="inner-search" placeholder="🔍 Поиск..." value="${state.q}">
                    <button class="search-btn" onclick="runSearch('catSearch')">Искать</button>
                </div>
                <div id="list-area" class="scroll">${state.q ? "" : renderCatsHtml(cats)}</div>
            </div>`;
        if (state.q) renderSearch();
    } else if (state.screen === 'setup') {
        app.innerHTML = `<header class="hdr"><div class="hdr-title">${state.currentCat}</div></header>
            <div class="scr"><div style="background-color:#1e293b; padding:20px; border-radius:20px; text-align:center; border:1px solid #6366f1">
            <button class="btn" onclick="state.mode='he';render()">Иврит → Перевод</button>
            <button class="btn" style="background-color:transparent; border:1px solid #334155; color:#94a3b8" onclick="state.mode='tr';render()">Транскрипция → Перевод</button>
            <button class="btn" style="margin-top:20px; background-color:#22c55e; color:#000" onclick="startFlash()">ПОГНАЛИ</button>
            <button onclick="state.screen='cats';render()" style="background:transparent; border: 1px solid #334155; color: #94a3b8; padding: 12px; margin-top: 10px; border-radius: 12px; cursor: pointer; width: 100%;">Назад</button></div></div>`;
    } else if (state.screen === 'flash') {
        const w = state.words[state.idx];
        const searchUI = (side) => `
            <div class="search-wrapper" onclick="event.stopPropagation()">
                <input type="text" id="inp_${side}" class="inner-search" placeholder="🔍 Найти...">
                <button class="search-btn" onclick="runSearch('inp_${side}')">Искать</button>
            </div>`;

        app.innerHTML = `<header class="hdr"><div class="hdr-title">${state.currentCat}</div></header>
            <div class="scr">
                <div class="flash-top">
                    <button class="btn-yellow-up" onclick="state.screen='cats';render()">▲</button>
                    <div style="font-size:18px; font-weight:bold; color:#94a3b8">${state.idx + 1} / ${state.words.length}</div>
                </div>
                <div class="flash-wrap">
                    <button class="side-nav side-prev" onclick="changeIdx(-1)">❮</button>
                    <div class="flip-container">
                        <div class="flipper ${state.isFlipped ? 'flipped' : ''}" onclick="state.isFlipped = !state.isFlipped; render()">
                            <div class="front">
                                ${searchUI('f')}
                                <div class="emoji-box">${w.icon}</div>
                                <button class="btn-voice" onclick="event.stopPropagation(); speak('${w.he}')">🔊</button>
                                <div class="word-main">${state.mode === 'he' ? w.he : w.tr}</div>
                                <div class="word-sub">[${w.tr}]</div>
                            </div>
                            <div class="back">
                                ${searchUI('b')}
                                <div class="emoji-box">${w.icon}</div>
                                <div class="word-main" style="color:#4ade80">${w.ru}</div>
                            </div>
                        </div>
                    </div>
                    <button class="side-nav side-next" onclick="changeIdx(1)">❯</button>
                </div>
            </div>`;
    }
}
function renderSearch() {
    const q = state.q.trim();
    const listArea = document.getElementById('list-area');
    if (!listArea) return;
    const filtered = DICT.filter(w => w.he.toLowerCase().indexOf(q) !== -1 || w.ru.toLowerCase().indexOf(q) !== -1 || w.tr.toLowerCase().indexOf(q) !== -1);
    listArea.innerHTML = filtered.map(w => `<div class="cat-card" onclick="jumpToWord('${w.he}')">
        <div style="font-size:22px; margin-right:12px">${w.icon}</div>
        <div><b>${w.he}</b> [${w.tr}]<br><small>${w.ru}</small></div></div>`).join('');
}
function renderCatsHtml(cats) {
    return cats.map(c => `<div class="cat-card" onclick="openSetup('${c}')"><div style="font-size:22px; margin-right:12px">${DICT.find(w => w.cat === c).icon || '📚'}</div><div>${c}</div></div>`).join('');
}
function jumpToWord(he) {
    const w = DICT.find(x => x.he === he);
    state.currentCat = w.cat; state.words = DICT.filter(x => x.cat === w.cat);
    state.idx = state.words.findIndex(x => x.he === he);
    state.isFlipped = false; state.screen = 'flash'; render();
}
function openSetup(c) { state.currentCat = c; state.screen = 'setup'; render(); }
function startFlash() {
    state.words = DICT.filter(w => w.cat === state.currentCat).sort(() => Math.random() - 0.5);
    state.idx = 0; state.isFlipped = false; state.screen = 'flash'; render();
}
function changeIdx(delta) {
    let n = state.idx + delta;
    if (n >= 0 && n < state.words.length) { state.idx = n; state.isFlipped = false; render(); }
}
render();
</script>
</body>
</html>
