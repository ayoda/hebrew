<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇮🇱 Иврит 1010 v44 - Final Fix</title>
<style>
:root { --bg-main: #0f172a; --bg-card: #1e293b; --accent: #6366f1; --yellow: #facc15; --text-main: #f1f5f9; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { 
    background-color: #0f172a; 
    color: #f1f5f9; 
    font-family: sans-serif;
    min-height: 100vh;
}

#app { 
    max-width: 480px; 
    margin: 0 auto; 
    padding: 15px;
    display: block; /* Уходим от flex на верхнем уровне */
}

.hdr { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
.hdr-title { font-size: 22px; font-weight: bold; color: #6366f1; }

.flash-nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.btn-up { 
    background: #facc15; color: #000; border: none; width: 55px; height: 55px; 
    border-radius: 12px; font-size: 24px; font-weight: 900; cursor: pointer;
}
.counter { font-size: 20px; font-weight: bold; color: #94a3b8; }

.flash-container { position: relative; width: 100%; height: 400px; margin: 0 auto; }
.flip-container { width: 100%; height: 100%; perspective: 1000px; }
.flipper { position: relative; width: 100%; height: 100%; transition: 0.5s; transform-style: preserve-3d; }
.flipper.flipped { transform: rotateY(180deg); }

.front, .back { 
    position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    background: #1e293b; border-radius: 24px; border: 2px solid #6366f1; padding: 20px; 
}
.back { transform: rotateY(180deg); border-color: #4ade80; }

.side-arrow { 
    position: absolute; top: 50%; transform: translateY(-50%); 
    background: rgba(0,0,0,0.7); border: 2px solid #6366f1; color: white; 
    width: 50px; height: 80px; border-radius: 12px; font-size: 24px; z-index: 99;
}
.arrow-prev { left: -10px; }
.arrow-next { right: -10px; }

.word-main { font-size: 38px; font-weight: bold; margin: 15px 0; text-align: center; }
.word-sub { font-size: 18px; color: #6366f1; }
.btn-voice { background: rgba(99,102,241,0.2); border: 2px solid #6366f1; color: #6366f1; padding: 12px 25px; border-radius: 50px; font-weight: bold; margin-bottom: 20px; }

.btn { background: #6366f1; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 700; width: 100%; margin-bottom: 15px; font-size: 18px; }
.cat-card { background: #1e293b; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
.cat-icon { font-size: 24px; margin-right: 15px; }
</style>
</head>
<body>
<div id="app">Загрузка системы...</div>

<script>
// Глобальный обработчик ошибок для диагностики на телефоне
window.onerror = function(msg, url, line) {
    document.getElementById('app').innerHTML = '<div style="color:red;padding:20px">Ошибка: ' + msg + '<br>Линия: ' + line + '</div>';
};

var GITHUB_USER = "ayoda"; 
var GITHUB_REPO = "hebrew"; 
var DICT = [];
var state = { screen: 'start', currentCat: null, words: [], idx: 0, isFlipped: false, mode: 'he', q: '', availableFiles: [] };

function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'he-IL';
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

function fetchFileList() {
    fetch('https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/contents/')
    .then(function(res) { return res.json(); })
    .then(function(data) {
        state.availableFiles = data.filter(function(f) { return f.name.indexOf('.txt') !== -1; });
        render();
    })
    .catch(function(err) { alert("Ошибка сети"); });
}

function loadFile(url) {
    fetch(url)
    .then(function(res) { return res.text(); })
    .then(function(text) {
        parseData(text);
        state.screen = 'cats';
        render();
    });
}

function parseData(content) {
    var lines = content.split('\n');
    DICT = [];
    for (var i = 0; i < lines.length; i++) {
        if (lines[i].indexOf(';') !== -1) {
            var p = lines[i].split(';');
            DICT.push({
                cat: p[0].trim(),
                he: p[1].trim(),
                tr: p[2].trim(),
                ru: p[3].trim(),
                icon: (p[4] || "📖").trim()
            });
        }
    }
}

function render() {
    var app = document.getElementById('app');
    var html = '';

    if (state.screen === 'start') {
        html += '<div class="hdr"><div class="hdr-title">ИВРИТ 1010</div></div>';
        html += '<div style="padding:10px">';
        if (state.availableFiles.length === 0) {
            html += '<button class="btn" onclick="fetchFileList()">🔄 ЗАГРУЗИТЬ СПИСКИ</button>';
        } else {
            for (var i = 0; i < state.availableFiles.length; i++) {
                var f = state.availableFiles[i];
                html += '<div class="cat-card" onclick="loadFile(\'' + f.download_url + '\')">📄 ' + f.name + '</div>';
            }
        }
        html += '</div>';
    } 
    else if (state.screen === 'cats') {
        var cats = [];
        DICT.forEach(function(item) { if (cats.indexOf(item.cat) === -1) cats.push(item.cat); });
        html += '<div class="hdr"><div class="hdr-title">ТЕМЫ</div></div>';
        cats.forEach(function(c) {
            html += '<div class="cat-card" onclick="openSetup(\'' + c + '\')">📚 ' + c + '</div>';
        });
        html += '<button class="btn" style="background:#334155;margin-top:20px" onclick="state.screen=\'start\';render()">Назад</button>';
    } 
    else if (state.screen === 'setup') {
        html += '<div class="hdr"><div class="hdr-title">' + state.currentCat + '</div></div>';
        html += '<div style="padding:10px">';
        html += '<button class="btn" onclick="state.mode=\'he\';startFlash()">Иврит → Перевод</button>';
        html += '<button class="btn" onclick="state.mode=\'tr\';startFlash()">Транскрипция → Перевод</button>';
        html += '</div>';
    } 
    else if (state.screen === 'flash') {
        var w = state.words[state.idx];
        html += '<div class="hdr"><div class="hdr-title">' + state.currentCat + '</div></div>';
        html += '<div class="flash-nav-top">';
        html += '<button class="btn-up" onclick="state.screen=\'cats\';render()">▲</button>';
        html += '<div class="counter">' + (state.idx + 1) + ' / ' + state.words.length + '</div>';
        html += '<div style="width:55px"></div></div>';
        
        html += '<div class="flash-container">';
        html += '<button class="side-arrow arrow-prev" onclick="changeIdx(-1)">❮</button>';
        html += '<div class="flip-container" onclick="state.isFlipped = !state.isFlipped; render()">';
        html += '<div class="flipper ' + (state.isFlipped ? 'flipped' : '') + '">';
        
        html += '<div class="front"><div style="font-size:50px">' + w.icon + '</div>';
        html += '<button class="btn-voice" onclick="event.stopPropagation(); speak(\'' + w.he + '\')">🔊</button>';
        html += '<div class="word-main">' + (state.mode === 'he' ? w.he : w.tr) + '</div>';
        html += '<div class="word-sub">[' + w.tr + ']</div></div>';
        
        html += '<div class="back"><div style="font-size:50px">' + w.icon + '</div>';
        html += '<div class="word-main" style="color:#4ade80">' + w.ru + '</div></div>';
        
        html += '</div></div>';
        html += '<button class="side-arrow arrow-next" onclick="changeIdx(1)">❯</button>';
        html += '</div>';
    }

    app.innerHTML = html;
}

function openSetup(c) { state.currentCat = c; state.screen = 'setup'; render(); }
function startFlash() {
    state.words = DICT.filter(function(w) { return w.cat === state.currentCat; });
    state.words.sort(function() { return 0.5 - Math.random(); });
    state.idx = 0; state.isFlipped = false; state.screen = 'flash'; render();
}
function changeIdx(delta) {
    var n = state.idx + delta;
    if (n >= 0 && n < state.words.length) { state.idx = n; state.isFlipped = false; render(); }
}

render();
</script>
</body>
</html>
