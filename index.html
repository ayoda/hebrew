<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇮🇱 Иврит 1010 v43 - Mobile Ultra</title>
<style>
:root { --bg-main: #0f172a; --bg-card: #1e293b; --accent: #6366f1; --yellow: #facc15; --text-main: #f1f5f9; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* Убираем жесткие 100vh, даем странице дышать */
body { 
    background: var(--bg-main); 
    color: var(--text-main); 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
}

#app { 
    max-width: 480px; 
    margin: 0 auto; 
    padding: 10px;
    min-height: 100vh;
}

.hdr { text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
.hdr-title { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }

/* Навигация сверху */
.flash-nav-top { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    margin-bottom: 15px; 
}
.btn-up { 
    background: var(--yellow); 
    color: #000; 
    border: none; 
    width: 50px; 
    height: 50px; 
    border-radius: 12px; 
    font-size: 24px; 
    font-weight: 900; 
    cursor: pointer; 
    box-shadow: 0 4px 0 #b45309;
}
.btn-up:active { transform: translateY(2px); box-shadow: 0 2px 0 #b45309; }
.counter { font-size: 20px; font-weight: bold; color: #94a3b8; }

/* Карточка */
.flash-container { 
    position: relative; 
    width: 100%; 
    height: 380px; /* Фиксированная высота для стабильности */
    margin: 0 auto;
}
.flip-container { perspective: 1000px; width: 100%; height: 100%; }
.flipper { position: relative; width: 100%; height: 100%; transition: transform 0.4s; transform-style: preserve-3d; cursor: pointer; }
.flipper.flipped { transform: rotateY(180deg); }

.front, .back { 
    position: absolute; 
    width: 100%; 
    height: 100%; 
    backface-visibility: hidden; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    background: var(--bg-card); 
    border-radius: 24px; 
    border: 2px solid rgba(99, 102, 241, 0.3); 
    padding: 20px; 
}
.back { transform: rotateY(180deg); border-color: #4ade80; }

/* Боковые стрелки */
.side-arrow { 
    position: absolute; 
    top: 50%; 
    transform: translateY(-50%); 
    background: rgba(15, 23, 42, 0.85); 
    border: 2px solid var(--accent); 
    color: white; 
    width: 48px; 
    height: 70px; 
    border-radius: 12px; 
    font-size: 24px; 
    z-index: 100;
    cursor: pointer;
}
.arrow-prev { left: -5px; }
.arrow-next { right: -5px; }

.emoji-box { font-size: 50px; margin-bottom: 10px; }
.word-main { font-size: 36px; font-weight: 800; text-align: center; }
.word-sub { font-size: 18px; color: var(--accent); margin-top: 10px; }

/* Голос */
.btn-voice { 
    background: rgba(99, 102, 241, 0.15); 
    border: 2px solid var(--accent); 
    color: var(--accent); 
    padding: 12px 24px; 
    border-radius: 50px; 
    margin-bottom: 20px; 
    font-weight: bold;
    font-size: 20px;
}

/* Списки */
.btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; width: 100%; margin-bottom: 10px; }
.cat-card { background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
.cat-icon { font-size: 24px; margin-right: 15px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: rgba(99,102,241,0.1); border-radius: 10px; }
.search-input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid var(--accent); background: #1e293b; color: #fff; margin-bottom: 15px; font-size: 18px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const GITHUB_USER = "ayoda"; 
const GITHUB_REPO = "hebrew"; 
let DICT = [];
let state = { screen: 'start', currentCat: null, words: [], idx: 0, isFlipped: false, mode: 'he', q: '', availableFiles: [] };

function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'he-IL';
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

async function fetchFileList() {
    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
        const files = await response.json();
        state.availableFiles = files.filter(f => f.name.endsWith('.txt'));
        render();
    } catch (err) { alert("Ошибка GitHub"); }
}

async function loadFile(url) {
    try {
        const response = await fetch(url);
        const text = await response.text();
        parseData(text);
        state.screen = 'cats';
        render();
    } catch (err) { alert("Ошибка файла"); }
}

function parseData(content) {
    DICT = content.split('\n').filter(l => l.includes(';')).map(line => {
        const p = line.split(';');
        return { cat: p[0].trim(), he: p[1].trim(), tr: p[2].trim(), ru: p[3].trim(), icon: (p[4] || "📖").trim() };
    });
}

function render() {
    const app = document.getElementById('app');
    if (state.screen === 'start') {
        app.innerHTML = `<div class="hdr"><div class="hdr-title">ИВРИТ 1010</div></div>
            <div class="scr">
                <h2 style="text-align:center; margin-bottom:20px">Шалом, Михалыч!</h2>
                ${state.availableFiles.length === 0 
                    ? '<button class="btn" onclick="fetchFileList()">🔄 ЗАГРУЗИТЬ СПИСКИ</button>' 
                    : state.availableFiles.map(f => `<div class="cat-card" onclick="loadFile('${f.download_url}')">📄 <b>${f.name}</b></div>`).join('')}
            </div>`;
    } else if (state.screen === 'cats') {
        const cats = [...new Set(DICT.map(w => w.cat))];
        app.innerHTML = `<div class="hdr"><div class="hdr-title">ТЕМЫ</div></div>
            <div class="scr">
                <input type="text" class="search-input" placeholder="🔍 Поиск..." oninput="state.q = this.value.toLowerCase(); renderSearch()" value="${state.q}">
                <div id="list-area">${state.q ? "" : renderCatsHtml(cats)}</div>
            </div>`;
        if (state.q) renderSearch();
    } else if (state.screen === 'setup') {
        app.innerHTML = `<div class="hdr"><div class="hdr-title">${state.currentCat}</div></div>
            <div class="scr" style="text-align:center">
                <button class="btn" onclick="state.mode='he';startFlash()">Иврит → Перевод</button>
                <button class="btn" onclick="state.mode='tr';startFlash()">Транскрипция → Перевод</button>
                <button class="btn" style="background:transparent; border:1px solid #334155" onclick="state.screen='cats';render()">Назад</button>
            </div>`;
    } else if (state.screen === 'flash') {
        const w = state.words[state.idx];
        app.innerHTML = `
            <div class="hdr"><div class="hdr-title">${state.currentCat}</div></div>
            <div class="scr">
                <div class="flash-nav-top">
                    <button class="btn-up" onclick="state.screen='cats';render()">▲</button>
                    <div class="counter">${state.idx + 1} / ${state.words.length}</div>
                    <div style="width:50px"></div>
                </div>
                <div class="flash-container">
                    <button class="side-arrow arrow-prev" onclick="changeIdx(-1)">❮</button>
                    <div class="flip-container">
                        <div class="flipper ${state.isFlipped ? 'flipped' : ''}" onclick="state.isFlipped = !state.isFlipped; render()">
                            <div class="front">
                                <div class="emoji-box">${w.icon}</div>
                                <button class="btn-voice" onclick="event.stopPropagation(); speak('${w.he}')">🔊 СЛУШАТЬ</button>
                                <div class="word-main">${state.mode === 'he' ? w.he : w.tr}</div>
                                <div class="word-sub">[${w.tr}]</div>
                            </div>
                            <div class="back">
                                <div class="emoji-box">${w.icon}</div>
                                <div class="word-main" style="color:#4ade80">${w.ru}</div>
                            </div>
                        </div>
                    </div>
                    <button class="side-arrow arrow-next" onclick="changeIdx(1)">❯</button>
                </div>
            </div>`;
    }
}

function renderSearch() {
    const q = state.q.trim();
    const listArea = document.getElementById('list-area');
    const filtered = DICT.filter(w => w.he.toLowerCase().includes(q) || w.ru.toLowerCase().includes(q) || w.tr.toLowerCase().includes(q));
    listArea.innerHTML = filtered.map(w => `<div class="cat-card" onclick="jumpToWord('${w.he}')">
        <div class="cat-icon">${w.icon}</div><div><b>${w.he}</b><br><small>${w.ru}</small></div></div>`).join('');
}
function renderCatsHtml(cats) {
    return cats.map(c => `<div class="cat-card" onclick="openSetup('${c}')"><div class="cat-icon">${DICT.find(w => w.cat === c).icon || '📚'}</div><div>${c}</div></div>`).join('');
}
function jumpToWord(he) {
    const w = DICT.find(x => x.he === he);
    state.currentCat = w.cat; state.words = DICT.filter(x => x.cat === w.cat);
    state.idx = state.words.findIndex(x => x.he === he);
    state.isFlipped = false; state.screen = 'flash'; render();
}
function openSetup(c) { state.currentCat = c; state.screen = 'setup'; render(); }
function startFlash() {
    state.words = DICT.filter(w => w.cat === state.currentCat).sort(() => Math.random() - 0.5);
    state.idx = 0; state.isFlipped = false; state.screen = 'flash'; render();
}
function changeIdx(delta) {
    let n = state.idx + delta;
    if (n >= 0 && n < state.words.length) { state.idx = n; state.isFlipped = false; render(); }
}
render();
</script>
</body>
</html>
