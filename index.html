<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>🇮🇱 Иврит 1010 v10</title>

<style>
/* Единая палитра и сброс стилей */
:root {
  --bg-main: #0f172a;
  --bg-card: #1e293b;
  --accent: #6366f1;
  --text-main: #f1f5f9;
  --text-muted: #94a3b8;
  --radius: 16px;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg-main);color:var(--text-main);font-family:'Inter', -apple-system, sans-serif;overflow:hidden}

#app{height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;position:relative}

/* Улучшенная шапка */
.hdr{
  background: rgba(30, 41, 59, 0.8);
  backdrop-filter: blur(8px);
  padding: 20px 15px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  z-index: 10;
}
.hdr-logo { font-size: 32px; margin-bottom: 4px; display: block; }
.hdr-title { font-size: 20px; font-weight: 800; letter-spacing: -0.025em; color: var(--accent); }
.hdr-sub { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

.scr{flex:1;display:flex;flex-direction:column;overflow:hidden; animation: fadeIn 0.3s ease-out;}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.scroll{flex:1;overflow-y:auto; padding: 20px 16px;}

/* Стилизация карточек категорий */
.cat-grid { display: grid; gap: 16px; }
.cat-card {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  align-items: center;
  transition: all 0.2s ease;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.cat-card:active { transform: scale(0.97); background: #334155; }
.cat-card::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent);
}

.cat-icon { 
  font-size: 32px; margin-right: 20px; 
  background: rgba(99, 102, 241, 0.1); 
  width: 60px; height: 60px; 
  display: flex; align-items: center; justify-content: center; 
  border-radius: 12px;
}

.cat-info { flex: 1; }
.cat-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.cat-count { font-size: 13px; color: var(--text-muted); }

/* Экраны диктанта и результата */
.dq-box { background: var(--bg-card); margin: 20px; padding: 30px; border-radius: var(--radius); text-align: center; box-shadow: var(--shadow); }
.dq-he { font-size: 42px; font-weight: 700; margin-bottom: 10px; color: #fff; }
.dq-tr { font-size: 18px; color: var(--accent); font-style: italic; margin-bottom: 20px; }

.btn-big {
  background: var(--accent);
  color: white;
  border: none;
  padding: 16px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  width: 100%;
  margin-top: 10px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-out { background: transparent; color: var(--text-muted); border: 1px solid #334155; margin-top: 12px; padding: 12px; width: 100%; border-radius: 12px; }

/* Кастомный скроллбар */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// Твой словарь и логика (сокращено для примера, сохрани свои данные!)
const dict = [
  {id:1, cat:'Дом', he:'Байт', tr:'бАйт', ru:'Дом', icon:'🏠'},
  {id:2, cat:'Еда', he:'Охель', tr:'Охель', ru:'Еда', icon:'🍎'},
  {id:3, cat:'Семья', he:'Мишпаха', tr:'мишпахА', ru:'Семья', icon:'👨‍👩‍👧'},
  {id:4, cat:'Работа', he:'Авода', tr:'аводА', ru:'Работа', icon:'💼'}
];

// Группировка
const categories = [...new Set(dict.map(w => w.cat))].map(name => {
  const words = dict.filter(w => w.cat === name);
  return { name, count: words.length, icon: words[0].icon || '📚' };
});

const app = document.getElementById('app');

function screenCats() {
  let html = `
    <header class="hdr">
      <span class="hdr-logo">🇮🇱</span>
      <div class="hdr-title">ИВРИТ 1010</div>
      <div class="hdr-sub">Михалыч, пора учиться</div>
    </header>
    <div class="scr">
      <div class="scroll">
        <div class="cat-grid">`;
  
  categories.forEach(cat => {
    html += `
      <div class="cat-card" onclick="startDictation('${cat.name}')">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-info">
          <div class="cat-name">${cat.name}</div>
          <div class="cat-count">${cat.count} слов</div>
        </div>
      </div>`;
  });

  html += `</div></div></div>`;
  app.innerHTML = html;
}

function startDictation(catName) {
  const words = dict.filter(w => w.cat === catName);
  let curIdx = 0;

  function showWord() {
    const w = words[curIdx];
    app.innerHTML = `
      <div class="scr">
        <div class="dq-box">
          <div class="hdr-sub">${catName} (${curIdx + 1}/${words.length})</div>
          <div class="dq-he">${w.he}</div>
          <div class="dq-tr">[${w.tr}]</div>
          <div style="font-size:20px; margin-bottom:20px">${w.ru}</div>
          <button class="btn-big" id="nextBtn">${curIdx === words.length - 1 ? 'Завершить' : 'Дальше'}</button>
          <button class="btn-out" onclick="screenCats()">Выйти</button>
        </div>
      </div>`;
    
    document.getElementById('nextBtn').onclick = () => {
      if (curIdx < words.length - 1) {
        curIdx++;
        showWord();
      } else {
        screenCats();
      }
    };
  }
  showWord();
}

// Запуск
screenCats();
</script>
</body>
</html>
