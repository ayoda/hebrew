<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🇮🇱 Иврит 1010 v73 - The Iron Spin</title>
<style>
:root { --bg-main: #0f172a; --bg-card: #1e293b; --accent: #6366f1; --yellow: #facc15; --text-main: #f1f5f9; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{height:100%;background:#0f172a;color:#f1f5f9;font-family:sans-serif;overflow:hidden}
#app{height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.hdr{background:rgba(30,41,59,0.9);padding:10px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0}
.hdr-title{font-size:18px;font-weight:800;color:#6366f1}
.scr{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px;position:relative}
.scroll{flex:1;overflow-y:auto}

/* ФАЙЛЫ: Нежно-голубой фон + Жирная белая рамка */
.file-item { 
    background-color: #add8e6 !important; 
    border: 3px solid #ffffff !important; 
    padding: 16px; border-radius: 15px; margin-bottom: 12px; cursor: pointer; 
}
.file-name { color: #000000 !important; font-weight: 900; font-size: 18px; text-align: center; }

/* ПОИСК В КАРТОЧКЕ (Строкой выше эмодзи) */
.search-wrapper { width: 100%; display: flex !important; margin-bottom: 15px; flex-shrink: 0; }
.inner-search { flex: 1; padding: 10px; border-radius: 10px 0 0 10px; border: 2px solid #6366f1; background: #0f172a; color: white; font-size: 14px; outline: none; }
.search-btn { width: 80px; background: #facc15; color: #000; border: 2px solid #6366f1; border-left: none; border-radius: 0 10px 10px 0; font-weight: 900; font-size: 12px; cursor: pointer; }

/* 3D ПОВОРОТ: Жесткая фиксация оси */
.flash-wrap { position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
.flipper { 
    position: relative; width: 100%; height: 400px; 
    transition: transform 0.6s; transform-style: preserve-3d; 
}
.flipper.flipped { transform: rotateY(180deg); }

.front, .back { 
    position: absolute; width: 100%; height: 100%; 
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    background: #1e293b; border-radius: 24px; border: 2px solid #6366f1; padding: 20px; 
}
.back { transform: rotateY(180deg); border-color: #4ade80; }

.side-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(99, 102, 241, 0.4); border: 1px solid #6366f1; color: white; width: 42px; height: 80px; border-radius: 10px; font-size: 26px; z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.side-prev { left: -5px; }
.side-next { right: -5px; }

.emoji-box { font-size: 60px; margin-bottom: 10px; }
.word-main { font-size: 36px; font-weight: 800; text-align: center; line-height: 1.2; }
.word-sub { font-size: 18px; color: #6366f1; margin-top: 15px; text-align: center; }
.btn-voice { background: transparent; border: 2px solid #6366f1; color: #6366f1; padding: 10px 25px; border-radius: 50px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }

.btn { background: #6366f1; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; width: 100%; }
.cat-card { background: #1e293b; border-radius: 16px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; cursor: pointer; border: 1px solid #334155; }
</style>
</head>
<body>
<div id="app"></div>
<script>
var GITHUB_USER = "ayoda"; var GITHUB_REPO = "hebrew"; 
var DICT = []; var state = { screen: 'start', currentCat: null, words: [], idx: 0, isFlipped: false, mode: 'he', q: '', availableFiles: [] };

function speak(text) {
    if (!window.speechSynthesis) return; window.speechSynthesis.cancel();
    var utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'he-IL';
    utterance.rate = 0.9; window.speechSynthesis.speak(utterance);
}

function fetchFileList() {
    fetch('https://api.github.com/repos/'+GITHUB_USER+'/'+GITHUB_REPO+'/contents/')
    .then(function(res){return res.json();}).then(function(data){
        state.availableFiles = data.filter(function(f){return f.name.indexOf('.txt')!==-1;});
        render();
    });
}

function loadFile(url) {
    fetch(url).then(function(res){return res.json ? res.text() : '';}).then(function(text){
        parseData(text); state.screen = 'cats'; render();
    });
}

function parseData(content) {
    var lines = content.split('\n'); DICT = [];
    for (var i = 0; i < lines.length; i++) {
        if (lines[i].indexOf(';') !== -1) {
            var p = lines[i].split(';');
            DICT.push({ cat: p[0].trim(), he: p[1].trim(), tr: p[2].trim(), ru: p[3].trim(), icon: (p[4] || "📖").trim() });
        }
    }
}

function runSearch(val) {
    if(!val) return; state.q = val.toLowerCase(); state.screen = 'cats'; render();
}

function render() {
    var app = document.getElementById('app'); var html = '';
    if (state.screen === 'start') {
        html += '<header class="hdr"><div class="hdr-title">ИВРИТ 1010</div></header><div class="scr scroll"><h2 style="text-align:center; margin-bottom:20px; color:#fff">Шалом, Михалыч!</h2>';
        if (state.availableFiles.length === 0) {
            html += '<button class="btn" onclick="fetchFileList()">🔄 ЗАГРУЗИТЬ СПИСОК</button>';
        } else {
            for (var i = 0; i < state.availableFiles.length; i++) {
                var f = state.availableFiles[i];
                html += '<div class="file-item" onclick="loadFile(\''+f.download_url+'\')"><div class="file-name">📄 '+f.name+'</div></div>';
            }
        }
        html += '</div>';
    } else if (state.screen === 'cats') {
        var cats = []; for (var j=0; j<DICT.length; j++) { if (cats.indexOf(DICT[j].cat)===-1) cats.push(DICT[j].cat); }
        var catsHtml = ''; for (var k=0; k<cats.length; k++) {
            var first = DICT.filter(function(w){return w.cat===cats[k]})[0];
            catsHtml += '<div class="cat-card" onclick="openSetup(\''+cats[k]+'\')"><div style="font-size:22px; margin-right:12px">'+(first.icon||'📚')+'</div><div>'+cats[k]+'</div></div>';
        }
        html += '<header class="hdr"><div class="hdr-title">ТЕМЫ</div></header><div class="scr"><div class="search-wrapper"><button onclick="state.screen=\'start\';render()" style="background:#facc15; border:none; border-radius:10px; width:45px; margin-right:8px; font-weight:bold">▲</button><input type="text" id="catSearch" class="inner-search" placeholder="🔍 Поиск..." value="'+state.q+'"><button class="search-btn" onclick="runSearch(document.getElementById(\'catSearch\').value)">Искать</button></div><div id="list-area" class="scroll">'+(state.q ? "" : catsHtml)+'</div></div>';
    } else if (state.screen === 'setup') {
        html += '<header class="hdr"><div class="hdr-title">'+state.currentCat+'</div></header><div class="scr"><div style="background:#1e293b; padding:20px; border-radius:20px; text-align:center; border:1px solid #6366f1"><button class="btn" onclick="state.mode=\'he\';render()">Иврит → Перевод</button><button class="btn" style="background:transparent; border: 1px solid #334155; color: #94a3b8" onclick="state.mode=\'tr\';render()">Транскрипция → Перевод</button><button class="btn" style="margin-top:20px; background:#22c55e; color:#000" onclick="startFlash()">ПОГНАЛИ</button><button onclick="state.screen=\'cats\';render()" style="background:transparent; border: 1px solid #334155; color: #94a3b8; padding: 12px; margin-top: 10px; border-radius: 12px; cursor: pointer; width: 100%;">Назад</button></div></div>';
    } else if (state.screen === 'flash') {
        var w = state.words[state.idx];
        var searchUI = function(id) { return '<div class="search-wrapper" onclick="event.stopPropagation()"><input type="text" id="'+id+'" class="inner-search" placeholder="🔍 Искать слово..."><button class="search-btn" onclick="runSearch(document.getElementById(\''+id+'\').value)">Искать</button></div>'; };
        html += '<header class="hdr"><div class="hdr-title">'+state.currentCat+'</div></header><div class="scr">';
        html += '<div class="flash-top"><button class="btn-yellow-up" style="background:#facc15; border:none; border-radius:10px; width:45px; height:45px; font-weight:bold" onclick="state.screen=\'cats\';render()">▲</button><div style="font-size:20px; font-weight:bold; color:#94a3b8">'+(state.idx+1)+' / '+state.words.length+'</div></div>';
        html += '<div class="flash-wrap"><button class="side-nav side-prev" onclick="changeIdx(-1)">❮</button>';
        html += '<div class="flipper '+(state.isFlipped?'flipped':'')+'" onclick="state.isFlipped=!state.isFlipped; render()">';
        html += '<div class="front">'+searchUI('inf')+'<div class="emoji-box">'+w.icon+'</div><button class="btn-voice" onclick="event.stopPropagation(); speak(\''+w.he+'\')">🔊 СЛУШАТЬ</button><div class="word-main">'+(state.mode==='he'?w.he:w.tr)+'</div><div class="word-sub">['+w.tr+']</div></div>';
        html += '<div class="back">'+searchUI('inb')+'<div class="emoji-box">'+w.icon+'</div><div class="word-main" style="color:#4ade80">'+w.ru+'</div></div>';
        html += '</div><button class="side-nav side-next" onclick="changeIdx(1)">❯</button></div></div>';
    }
    app.innerHTML = html; if (state.screen === 'cats' && state.q) renderSearch();
}

function renderSearch() {
    var q = state.q.trim(); var listArea = document.getElementById('list-area'); if (!listArea) return;
    var resHtml = ''; for (var i=0; i<DICT.length; i++) {
        var item = DICT[i]; if (item.he.toLowerCase().indexOf(q)!==-1 || item.ru.toLowerCase().indexOf(q)!==-1 || item.tr.toLowerCase().indexOf(q)!==-1) {
            resHtml += '<div class="cat-card" onclick="jumpToWord(\''+item.he+'\')"><div style="font-size:22px; margin-right:12px">'+item.icon+'</div><div><b>'+item.he+'</b> ['+item.tr+']<br><small>'+item.ru+'</small></div></div>';
        }
    }
    listArea.innerHTML = resHtml;
}

function jumpToWord(he) {
    var w = DICT.filter(function(x){return x.he===he})[0];
    state.currentCat = w.cat; state.words = DICT.filter(function(x){return x.cat===w.cat});
    for (var i=0; i<state.words.length; i++) { if (state.words[i].he===he) { state.idx=i; break; } }
    state.isFlipped=false; state.screen='flash'; render();
}
function openSetup(c) { state.currentCat = c; state.screen = 'setup'; render(); }
function startFlash() {
    state.words = DICT.filter(function(w){return w.cat===state.currentCat}).sort(function(){return 0.5-Math.random()});
    state.idx = 0; state.isFlipped = false; state.screen = 'flash'; render();
}
function changeIdx(delta) { var n = state.idx + delta; if (n >= 0 && n < state.words.length) { state.idx = n; state.isFlipped = false; render(); } }
render();
</script>
</body>
</html>
