<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ИВРИТ 1010 v60 - Master Voice</title>
<style>
:root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f1f5f9; }
body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;display:flex;justify-content:center;height:100dvh;overflow:hidden}
#app{width:100%;max-width:450px;padding:15px;display:flex;flex-direction:column;height:100%}
.card{background:var(--card);padding:30px;border-radius:28px;border:2px solid #334155;text-align:center;margin:15px 0;flex-grow:1;display:flex;flex-direction:column;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,0.3);cursor:pointer}
.btn{background:var(--accent);color:white;border:none;padding:18px;border-radius:18px;font-weight:bold;cursor:pointer;width:100%;font-size:16px;box-shadow:0 4px 0 #4338ca;transition:0.1s}
.btn:active{transform:translateY(2px);box-shadow:0 0 0 #4338ca}
.word{font-size:52px;font-weight:800;margin:10px 0;letter-spacing:1px}
.tr{font-size:24px;color:var(--accent);margin-bottom:15px}
#engine-tag{font-size:10px;text-align:center;color:#64748b;font-family:monospace;margin-bottom:5px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const GITHUB_USER = "ayoda"; 
const GITHUB_REPO = "hebrew"; 
let DICT = [];
let state = { screen: 'start', words: [], idx: 0, flipped: false, files: [] };

let isSpeaking = false;

function speak(text) {
    if (isSpeaking) return;
    const tag = document.getElementById('engine-tag');
    const cleaned = text.replace(/[\u0591-\u05C7]/g, "").trim();
    
    isSpeaking = true;
    
    // МЕТОД 1: Качественный Proxy Microsoft/Google
    const audio = new Audio();
    audio.src = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleaned)}&tl=iw&client=tw-ob`;
    
    audio.onended = () => { isSpeaking = false; };
    
    audio.play()
    .then(() => { if(tag) tag.innerText = "ENGINE: HIGH-DEFINITION (ONLINE)"; })
    .catch(() => {
        // МЕТОД 2: Резервный системный (Firefox-only fix)
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(cleaned);
            utter.lang = 'he-IL';
            utter.rate = 0.7; // Замедляем еще сильнее для Линукса
            utter.onend = () => { isSpeaking = false; };
            window.speechSynthesis.speak(utter);
            if(tag) tag.innerText = "ENGINE: LOCAL SYSTEM (RESERVE)";
        } else {
            isSpeaking = false;
        }
    });
}

async function start() {
    try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
        const data = await res.json();
        state.files = data.filter(f => f.name.endsWith('.txt'));
        render();
    } catch(e) { alert("GitHub Connection Error"); }
}

async function load(url) {
    const res = await fetch(url);
    const text = await res.text();
    DICT = text.split('\n').filter(l => l.includes(';')).map(line => {
        const p = line.split(';');
        return { he: p[1].trim(), tr: p[2].trim(), ru: p[3].trim() };
    });
    state.words = DICT; state.idx = 0; state.screen = 'play'; render();
}

function render() {
    const app = document.getElementById('app');
    if (state.screen === 'start') {
        app.innerHTML = `<h2 style="text-align:center">ИВРИТ 1010</h2><div style="flex-grow:1; overflow-y:auto">` + 
            state.files.map(f => `<button class="btn" style="margin-bottom:12px" onclick="load('${f.download_url}')">📄 ${f.name}</button>`).join('') +
            `</div>`;
    } else {
        const w = state.words[state.idx];
        app.innerHTML = `
            <div id="engine-tag">READY</div>
            <div class="card" onclick="state.flipped=!state.flipped;render()">
                ${!state.flipped ? `
                    <button class="btn" style="background:#22c55e; box-shadow:0 4px 0 #166534" onclick="event.stopPropagation(); speak('${w.he}')">🔊 СЛУШАТЬ</button>
                    <div class="word">${w.he}</div>
                    <div class="tr">${w.tr}</div>
                ` : `
                    <div class="word" style="color:#22c55e">${w.ru}</div>
                `}
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                <button class="btn" style="background:#334155; box-shadow:0 4px 0 #1e293b" onclick="state.idx=Math.max(0,state.idx-1);state.flipped=false;render()">⬅</button>
                <button class="btn" onclick="state.idx=Math.min(state.words.length-1,state.idx+1);state.flipped=false;render()">➡</button>
            </div>
            <button onclick="state.screen='start';render()" style="background:none; border:none; color:#64748b; margin-top:15px; cursor:pointer">К выбору словаря</button>
        `;
    }
}
start();
</script>
</body>
</html>
